server:
  port: 18080

spring:
  application:
    name: mall-app-api-v3
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:13306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: "${MYSQL_USERNAME:root}"
    password: "${MYSQL_PASSWORD:root}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 16379
      database: 0
    mongodb:
      uri: mongodb://localhost:27018/mall
  elasticsearch:
    uris: http://localhost:9201
  rabbitmq:
    host: localhost
    port: 5673
    username: "${RABBITMQ_USERNAME:mall}"
    password: "${RABBITMQ_PASSWORD:mall}"
    virtual-host: /mall
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mall.module.*.entity
  global-config:
    db-config:
      logic-delete-field: deleteStatus
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

mall:
  auth:
    token-header: Authorization
    token-head: "Bearer "
    jwt-secret: "${MALL_JWT_SECRET:change-this-to-a-long-random-secret-value-at-least-32-chars}"
    jwt-expiration-seconds: 604800
